{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-lg flex flex-col gap-6">
        <!-- Табы -->
        <div class="flex border-b-2 border-gray-200">
            <a href="{{ url_for('login') }}" class="flex-1 text-center py-3 font-semibold text-gray-400 hover:text-gray-600">
                ВХОД
            </a>
            <a href="{{ url_for('register') }}" class="flex-1 text-center py-3 font-semibold text-gray-800 border-b-2 border-gray-800 -mb-2">
                РЕГИСТРАЦИЯ
            </a>
        </div>

        <!-- Форма -->
        <form action="{{ url_for('register') }}" method="POST" class="flex flex-col gap-4">
            <div class="flex flex-col gap-1">
                <label class="text-xs text-gray-500">Фамилия</label>
                <input type="text" name="surname" required class="bg-purple-50 border-0 rounded-lg py-3 px-4 text-gray-800 focus:outline-none focus:ring-2 focus:ring-accent" placeholder="Иванов">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-xs text-gray-500">Имя</label>
                <input type="text" name="name" required class="bg-purple-50 border-0 rounded-lg py-3 px-4 text-gray-800 focus:outline-none focus:ring-2 focus:ring-accent" placeholder="Иван">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-xs text-gray-500">E-mail</label>
                <input type="email" name="email" required class="bg-purple-50 border-0 rounded-lg py-3 px-4 text-gray-800 focus:outline-none focus:ring-2 focus:ring-accent" placeholder="example@mail.com">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-xs text-gray-500">Пароль</label>
                <input type="password" name="password" required class="bg-purple-50 border-0 rounded-lg py-3 px-4 text-gray-800 focus:outline-none focus:ring-2 focus:ring-accent" placeholder="••••••••">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-xs text-gray-500">Подтверждение пароля</label>
                <input type="password" name="confirm_password" required class="bg-purple-50 border-0 rounded-lg py-3 px-4 text-gray-800 focus:outline-none focus:ring-2 focus:ring-accent" placeholder="••••••••">
            </div>

            <button type="submit" class="bg-accent hover:bg-accentHover text-white py-3 px-4 rounded-lg font-semibold transition mt-2">
                ЗАРЕГИСТРИРОВАТЬСЯ
            </button>
        </form>

        <!-- Google -->
        <button class="border-2 border-gray-300 rounded-lg py-3 px-4 font-medium hover:bg-gray-50 transition flex items-center justify-center gap-2">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Продолжить с Google
        </button>

        <div class="border-t border-gray-200"></div>

        <p class="text-center text-sm text-gray-500">
            Есть аккаунт? <a href="{{ url_for('login') }}" class="text-accent hover:underline">Войти</a>
        </p>
    </div>
</div>
{% endblock %}
